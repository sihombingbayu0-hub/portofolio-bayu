<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1E3C2B" />
    <meta name="description" content="Aplikasi pencatat keuangan pribadi yang nyaman digunakan di HP" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="UangKuNi" />
    <link rel="manifest" href="./manifest.json" />
    <link rel="icon" href="./icon-192.png" type="image/png" />
    <link rel="apple-touch-icon" href="./icon-192.png" />
    <title>Uang Ku Ni</title>

  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
    <script>
      // Service worker hanya didaftarkan jika didukung oleh browser.
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", function () {
          navigator.serviceWorker.register("./service-worker.js").catch(function () {
            // Aplikasi tetap dapat dipakai jika service worker tidak tersedia.
          });
        });
      }
    </script>
  </body>
</html>
